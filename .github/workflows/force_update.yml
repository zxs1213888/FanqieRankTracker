name: Force Update (Re-scrape + Re-summarize)

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

on:
  workflow_dispatch: # 仅手动触发

jobs:
  force-update:
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install --with-deps chromium

    - name: Run Scraper (Force)
      run: python scrape_fanqie_ranks.py
      env:
        GITHUB_ACTIONS: true

    - name: Build Latest Data with AI Summary (Force)
      run: pip install openai && python scripts/build_latest.py --force
      env:
        API_BASE_URL: ${{ secrets.API_BASE_URL }}
        API_KEY: ${{ secrets.API_KEY }}
        API_MODEL: ${{ secrets.API_MODEL }}

    - name: Commit and Push Changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "[Force] Re-scrape and re-summarize Fanqie ranks"
        file_pattern: data/*
        branch: main

    # ---- Deploy to GitHub Pages ----
    - name: Setup Pages
      uses: actions/configure-pages@v5
      with:
        enablement: true

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
