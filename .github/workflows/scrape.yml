name: Daily Fanqie Rank Scraper

permissions:
  contents: write

on:
  schedule:
    # 每天 UTC 00:00 (北京时间 08:00) 触发
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动在界面上点击 Run workflow

jobs:
  scrape-and-commit:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }} # Auto-provided

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install --with-deps chromium

    - name: Run Scraper
      run: python scrape_fanqie_ranks.py
      env:
        GITHUB_ACTIONS: true

    - name: Commit and Push Changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "[Auto] Update Fanqie daily ranks"
        file_pattern: data/*
        branch: main
